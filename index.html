<!doctype html>
<html lang="en" class="scroll-smooth">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- ── Primary SEO ─────────────────────────────────────────── -->
    <title>Synapse AI — Next-Gen GenAI Data Automation Platform</title>
    <meta
      name="description"
      content="Synapse AI transforms raw enterprise data into actionable intelligence using advanced generative AI pipelines. Automate ingestion, enrichment, and real-time analysis at any scale — zero engineering overhead."
    />
    <meta name="keywords" content="GenAI, data automation, AI platform, generative AI, enterprise data, LLM pipeline, AI workflows, data enrichment, real-time AI" />
    <meta name="author" content="Synapse AI" />
    <meta name="robots" content="index, follow, max-snippet:-1, max-image-preview:large" />
    <link rel="canonical" href="https://synapse-ai.io/" />

    <!-- ── Open Graph ───────────────────────────────────────────── -->
    <meta property="og:type"        content="website" />
    <meta property="og:url"         content="https://synapse-ai.io/" />
    <meta property="og:title"       content="Synapse AI — Next-Gen GenAI Data Automation Platform" />
    <meta property="og:description" content="Transform raw enterprise data into real-time intelligence with zero-code GenAI pipelines. Scale from prototype to production in minutes." />
    <meta property="og:image"       content="https://synapse-ai.io/og-image.png" />
    <meta property="og:image:alt"   content="Synapse AI Platform Preview" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:site_name"   content="Synapse AI" />
    <meta property="og:locale"      content="en_US" />

    <!-- ── Twitter Card ─────────────────────────────────────────── -->
    <meta name="twitter:card"        content="summary_large_image" />
    <meta name="twitter:site"        content="@SynapseAI" />
    <meta name="twitter:title"       content="Synapse AI — Next-Gen GenAI Data Automation Platform" />
    <meta name="twitter:description" content="Transform raw enterprise data into real-time intelligence with zero-code GenAI pipelines." />
    <meta name="twitter:image"       content="https://synapse-ai.io/og-image.png" />

    <!-- ── Structured Data (JSON-LD) ────────────────────────────── -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "SoftwareApplication",
        "name": "Synapse AI",
        "applicationCategory": "BusinessApplication",
        "operatingSystem": "Web",
        "description": "Advanced GenAI data automation platform for enterprise intelligence workflows.",
        "url": "https://synapse-ai.io/",
        "publisher": {
          "@type": "Organization",
          "name": "Synapse AI",
          "logo": {
            "@type": "ImageObject",
            "url": "https://synapse-ai.io/logo.png"
          }
        },
        "offers": {
          "@type": "Offer",
          "price": "0",
          "priceCurrency": "USD",
          "availability": "https://schema.org/InStock"
        }
      }
    </script>

    <!-- ── Favicon ───────────────────────────────────────────────── -->
    <link rel="icon"             type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon"             type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <meta name="theme-color"     content="#0A0E1A" />

    <!-- ── Critical Fonts (swap for zero FOIT) ──────────────────── -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
  </head>

  <body class="bg-background text-text-base antialiased">
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
